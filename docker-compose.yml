version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind_pass
      POSTGRES_DB: docmind_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docmind -d docmind_db']
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: